name: Secrets CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  secrets-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install test deps
        run: python -m pip install pytest
      - name: Run secrets-related unit tests (uses repo secrets)
        env:
          # Inject repository secrets into the job environment safely
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          VAULT_SECRET_PATH: ${{ secrets.VAULT_SECRET_PATH }}
          RUN_STRESS: 0
          ENABLE_OTEL: false
        working-directory: graph_rag_enterprise_2
        run: |
          PYTHONPATH=.. RUN_STRESS=0 ENABLE_OTEL=false python -m pytest tests/test_secrets_vault.py -q
