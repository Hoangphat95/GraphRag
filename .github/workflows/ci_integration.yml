name: CI Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (true/false)'
        required: false
        default: 'false'
      run_stress:
        description: 'Run stress tests (true/false)'
        required: false
        default: 'false'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # default to not running long-running stress or integration steps
      RUN_STRESS: '0'
      RUN_INTEGRATION: '0'
    services:
      neo4j:
        image: neo4j:5
        options: >-
          --health-cmd="curl -f http://localhost:7474 || exit 1" --health-interval=10s --health-timeout=5s --health-retries=10
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt || true
      - name: Wait for Neo4j
        if: ${{ env.RUN_INTEGRATION == '1' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true') }}
        run: |
          python graph_rag_enterprise_2/scripts/wait_for_neo4j.py
      - name: Run tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
        run: |
          PYTHONPATH=. pytest -q
