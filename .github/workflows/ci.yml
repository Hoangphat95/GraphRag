name: GraphRAG CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable tmate debug session'
        required: false
        default: 'false'
      run_integration:
        description: 'Run integration tests (true/false)'
        required: false
        default: 'false'
      run_stress:
        description: 'Run stress tests (true/false)'
        required: false
        default: 'false'

env:
  PYTHONPATH: .
  RUN_STRESS: '0'
  RUN_INTEGRATION: '0'

jobs:
  # ============================================================
  # 1. UNIT TESTS + LINT
  # ============================================================
  unit-tests:
    name: Unit Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with Ruff
        run: |
          ruff check app/ tests/ --output-format=github || echo "Lint warnings found"

      - name: Run unit tests
        run: |
          pytest tests -q --ignore=tests/test_stress_conversation.py \
            --ignore=tests/test_tracing_init.py \
            -x --timeout=30

  # ============================================================
  # 4. STRESS TESTS (manual only)
  # ============================================================
  stress-tests:
    name: Stress Tests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_stress == 'true' }}
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        options: >-
          --health-cmd="curl -f http://localhost:7474 || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=10
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install
        run: uv sync --dev

      - name: Wait for Neo4j
        run: python app/backup/wait_for_neo4j.py

      - name: Run stress tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          RUN_STRESS: '1'
          STRESS_TURNS: '10'
        run: |
          python -m pytest tests/test_stress_conversation.py -q -x --timeout=300

  # ============================================================
  # 5. SECURITY SCAN
  # ============================================================
  security-scan:
    name: Security Audit
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Scan dependencies
        run: |
          python -m pip_audit . || echo "Vulnerabilities found (non-blocking)"

  # ============================================================
  # 6. BUILD CHECK (Docker)
  # ============================================================
  docker-build:
    name: Docker Build Check
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: graphrag-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 7. DEPLOY (manual trigger, main branch only)
  # ============================================================
  deploy:
    name: Deploy to Production
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
    needs: [unit-tests, integration-tests, security-scan, docker-build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts || true

      - name: Copy files to server
        run: |
          rsync -avz --exclude='.git' --exclude='__pycache__' --exclude='.env' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/app/graphrag/

      - name: Restart service
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /app/graphrag && docker compose up -d --build graphrag-api" || true

  # ============================================================
  # 8. DEBUG (tmate, manual only)
  # ============================================================
  debug:
    name: Debug via tmate
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Start tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
