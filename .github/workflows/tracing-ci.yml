name: Tracing CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  tracing-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install test deps
        run: python -m pip install pytest
      - name: Run tracing unit tests
        env:
          RUN_STRESS: 0
          ENABLE_OTEL: false
        working-directory: graph_rag_enterprise_2
        run: |
          PYTHONPATH=.. RUN_STRESS=0 ENABLE_OTEL=false python -m pytest tests/test_tracing_init.py -q
