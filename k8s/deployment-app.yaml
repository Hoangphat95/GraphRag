apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-rag-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graph-rag
  template:
    metadata:
      labels:
        app: graph-rag
    spec:
      containers:
        - name: graph-rag
          image: myregistry/graph-rag:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: faiss-data
              mountPath: /app/data
              readOnly: false
            - name: graph-rag-secrets
              mountPath: /var/run/secrets
              readOnly: true
          env:
            - name: NEO4J_URI
              value: bolt://neo4j:7687
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graph-rag-secrets
                  key: NEO4J_PASSWORD
            - name: FAISS_INDEX_PATH
              value: /app/data/faiss.index
            - name: FAISS_META_PATH
              value: /app/data/faiss_meta.pkl
      volumes:
        - name: faiss-data
          persistentVolumeClaim:
            claimName: faiss-pvc
        - name: graph-rag-secrets
          secret:
            secretName: graph-rag-secrets
