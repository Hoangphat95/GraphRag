groups:
  - name: graph_rag_alerts
    rules:
      - alert: HighNeo4jQueryFailures
        expr: grag_neo4j_query_failures_total_rate > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High Neo4j query failure rate"
          description: "Neo4j query failure rate is > 0.1/s for 2 minutes."

      - alert: HighQueryLatency
        expr: grag_query_latency_seconds_bucket{le="1.0"} < 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High query latency"
          description: "Less than 90% of queries are under 1s."

      - alert: HighRequestRate
        expr: increase(grag_requests_total[1m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request rate"
          description: "Request rate exceeds 100/minute."

      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(grag_llm_latency_seconds_bucket[5m])) > 1.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM latency"
          description: "95th percentile LLM latency over 5m > 1.5s."

      - alert: LLMFailures
        expr: increase(grag_llm_calls_total{success="false"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LLM failures detected"
          description: "Non-zero failed LLM calls in the last 5 minutes."

      - alert: HighPipelineLatency
        expr: histogram_quantile(0.95, rate(grag_pipeline_latency_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High pipeline latency"
          description: "95th percentile pipeline latency over 5m > 2.0s."

      - alert: LargeNeo4jResultSet
        expr: (increase(grag_neo4j_rows_returned_sum[5m]) / increase(grag_neo4j_rows_returned_count[5m])) > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Large average Neo4j rows returned"
          description: "Average rows returned per query over 5m > 500, indicating heavy queries."
